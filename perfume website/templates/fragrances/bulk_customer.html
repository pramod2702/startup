<!DOCTYPE html>
<html>
<head>
    <title>Bulk Customer Form - VICTNOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: white;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(25px);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 0 1px rgba(212, 175, 55, 0.2);
            max-width: 700px;
            width: 100%;
            position: relative;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #d4af37;
            font-size: 32px;
            cursor: pointer;
            font-weight: bold;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }
        
        h2 {
            color: #d4af37;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-align: center;
            font-family: 'Playfair Display', serif;
        }
        
        .subtitle {
            color: #fff;
            font-size: 1.1rem;
            opacity: 0.9;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .price-tag {
            display: inline-block;
            background: linear-gradient(45deg, #d4af37, #f4e4bc, #d4af37);
            background-size: 200% 200%;
            animation: shimmer 3s ease-in-out infinite;
            padding: 20px 40px;
            border-radius: 50px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 
                0 0 0 3px rgba(212, 175, 55, 0.3),
                0 0 20px rgba(212, 175, 55, 0.2),
                0 10px 40px rgba(0, 0, 0, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .price-tag::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #d4af37, #4ecdc4, #d4af37);
            border-radius: 50px;
            z-index: -1;
            animation: borderGlow 4s linear infinite;
            opacity: 0.7;
        }
        
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        
        .price-tag:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 0 0 5px rgba(212, 175, 55, 0.4),
                0 0 30px rgba(212, 175, 55, 0.4),
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 2px 0 rgba(255, 255, 255, 0.4);
        }
        
        .price-tag .label {
            color: #0a2e0a;
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(255, 255, 255, 0.5);
            position: relative;
            display: block;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            background: rgba(10, 46, 10, 0.2);
            color: #fff;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(10, 46, 10, 0.3);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #b8941f);
            color: #0a2e0a;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #51cf66;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .bulk-info {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #d4af37;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <a href="javascript:history.back()" class="close-btn">&times;</a>
        
        <h2>Bulk Customer Form</h2>
        <p class="subtitle">Corporate Gifting - Premium fragrance solutions for your business</p>
        
                
        <div class="bulk-info">
            <i class="fas fa-info-circle"></i> 
            Minimum order quantity: 50 units. Custom pricing based on volume and requirements.
        </div>
        
        <div class="success-message" id="successMessage">
            <h3>✅ Bulk Order Inquiry Submitted!</h3>
            <p>Our team will contact you within 24 hours with custom pricing and details.</p>
        </div>
        
        <form name="bulk_customer" onsubmit="handleSubmit(event)">
            <div class="form-row">
                <div class="form-group">
                    <label for="company_name">
                        <i class="fas fa-building" style="margin-right: 8px;"></i>Entity Name *
                    </label>
                    <input type="text" id="company_name" name="company_name" placeholder="Enter your entity name" required>
                </div>
                
                <div class="form-group">
                    <label for="contact_person">
                        <i class="fas fa-user" style="margin-right: 8px;"></i>Contact Person *
                    </label>
                    <input type="text" id="contact_person" name="contact_person" placeholder="Your full name" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope" style="margin-right: 8px;"></i>Email Address *
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone" style="margin-right: 8px;"></i>Phone Number *
                    </label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="fragrance_type">
                        <i class="fas fa-spray-can" style="margin-right: 8px;"></i>Select Fragrance *
                    </label>
                    <select id="fragrance_type" name="fragrance_type" required>
                        <option value="">Select fragrance</option>
                        <option value="victnow_muse">VICTNOW MUSE</option>
                        <option value="victnow_nexus">VICTNOW NEXUS</option>
                        <option value="victnow_signature">VICTNOW SIGNATURE</option>
                        <option value="victnow_prestige">VICTNOW PRESTIGE</option>
                        <option value="victnow_royale">VICTNOW ROYALE</option>
                        <option value="victnow_classic">VICTNOW CLASSIC</option>
                        <option value="mixed_selection">Mixed Selection</option>
                        <option value="custom">Custom Fragrance</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="quantity">
                        <i class="fas fa-boxes" style="margin-right: 8px;"></i>Required Quantity *
                    </label>
                    <select id="quantity" name="quantity" required>
                        <option value="">Select quantity</option>
                        <option value="50">50 units</option>
                        <option value="75">75 units</option>
                        <option value="100">100 units</option>
                        <option value="150">150 units</option>
                        <option value="200">200 units</option>
                        <option value="250">250 units</option>
                        <option value="300">300 units</option>
                        <option value="400">400 units</option>
                        <option value="500">500 units</option>
                        <option value="750">750 units</option>
                        <option value="1000">1000 units</option>
                        <option value="1500">1500 units</option>
                        <option value="2000">2000 units</option>
                        <option value="2500">2500 units</option>
                        <option value="5000">5000 units</option>
                        <option value="10000">10000+ units</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="purpose">
                    <i class="fas fa-gift" style="margin-right: 8px;"></i>Purpose *
                </label>
                <select id="purpose" name="purpose" required>
                    <option value="">Select purpose</option>
                    <option value="corporate-gifting">Corporate Gifting</option>
                    <option value="employee-gifts">Employee Gifts</option>
                    <option value="client-gifts">Client Gifts</option>
                    <option value="events">Events & Functions</option>
                    <option value="promotional">Promotional Items</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="address">
                    <i class="fas fa-map-marker-alt" style="margin-right: 8px;"></i>Shipping Address *
                </label>
                <textarea id="address" name="address" placeholder="Enter your complete shipping address" required style="min-height: 100px; resize: vertical;"></textarea>
            </div>
            
            <div class="form-group">
                <label for="requirements">
                    <i class="fas fa-comment" style="margin-right: 8px;"></i>Special Requirements
                </label>
                <textarea id="requirements" name="requirements" placeholder="Any specific requirements, customization needs, or questions" style="min-height: 80px; resize: vertical;"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane" style="margin-right: 10px;"></i>
                Submit Bulk Order Inquiry
            </button>
        </form>
    </div>
    
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            
            // Convert form data to match backend expectations
            const bulkOrderData = {
                name: formData.get('contact_person'),
                email: formData.get('email'),
                company: formData.get('company_name'),
                phone: formData.get('phone'),
                address: formData.get('address'),
                fragrance_type: formData.get('fragrance_type'),
                quantity: formData.get('quantity'),
                purpose: formData.get('purpose'),
                requirements: formData.get('requirements') || ''
            };
            
                        
            // Show loading state
            const submitBtn = form.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            submitBtn.disabled = true;
            
            // Submit to backend
            fetch('/bulk-order-process/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: new URLSearchParams(bulkOrderData)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Bulk Order Response:', data);
                
                if (data.success) {
                    // Show success message with order ID
                    const successMsg = document.getElementById('successMessage');
                    successMsg.innerHTML = `
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h3>Bulk Order Submitted Successfully!</h3>
                        <p><strong>Order ID:</strong> ${data.order_id}</p>
                        <p>Thank you for your bulk order inquiry. Our team will contact you within 24 hours to confirm the details and proceed with your order.</p>
                        <p><strong>Order Details:</strong></p>
                        <ul style="text-align: left; display: inline-block;">
                            <li>Company: ${bulkOrderData.company}</li>
                            <li>Quantity: ${bulkOrderData.quantity} units</li>
                            <li>Fragrance: ${bulkOrderData.fragrance_type}</li>
                            <li>Email: ${bulkOrderData.email}</li>
                        </ul>
                    `;
                    successMsg.classList.add('show');
                    
                    // Hide form
                    form.style.display = 'none';
                    
                    // Store order ID for tracking
                    localStorage.setItem('lastBulkOrderId', data.order_id);
                    
                    // Redirect to thank you page after 5 seconds
                    setTimeout(() => {
                        window.location.href = '/corporate-gifting/?order_success=true&order_id=' + data.order_id;
                    }, 5000);
                } else {
                    // Show error message
                    alert('Error: ' + (data.message || 'Failed to submit bulk order. Please try again.'));
                    
                    // Reset button
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error submitting bulk order:', error);
                alert('Network error: Failed to submit bulk order. Please check your connection and try again.');
                
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            });
        }
        
        // Helper function to get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Add input focus effects
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input, textarea, select');
            
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
            
            // Check if there's a success message from previous submission
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('order_success') === 'true') {
                const orderId = urlParams.get('order_id');
                const successMsg = document.getElementById('successMessage');
                successMsg.innerHTML = `
                    <div class="success-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h3>Order Confirmation</h3>
                    <p>Your bulk order <strong>${orderId}</strong> has been received successfully!</p>
                    <p>Our team will contact you within 24 hours to confirm the details.</p>
                `;
                successMsg.classList.add('show');
                
                // Hide form
                document.querySelector('.form-container form').style.display = 'none';
            }
        });
    </script>
</body>
</html>
