<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About VICTNOW - Luxury Perfumes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            line-height: 1.6;
        }

        .about-victnow-section {
            background-color: #0b0b0b;
            padding: 60px 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        .about-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .about-content {
            flex: 1;
            max-width: 500px;
        }

        .about-label {
            color: #d4af37;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .about-heading {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 25px;
            line-height: 1.2;
        }

        .about-description {
            font-size: 16px;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        .learn-more-btn {
            display: inline-block;
            background-color: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .learn-more-btn:hover {
            background-color: #d4af37;
            color: #0b0b0b;
        }

        .about-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .about-image img {
            width: 420px;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .about-container {
                flex-direction: column;
                gap: 40px;
                text-align: center;
            }

            .about-content {
                max-width: 100%;
            }

            .about-heading {
                font-size: 36px;
            }

            .about-image img {
                width: 100%;
                max-width: 420px;
            }
        }
    </style>
</head>
<body>
    </body>
</html>
