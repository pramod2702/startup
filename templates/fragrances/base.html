    <script>
        // Authentication Functions
        function initializeMobileTouchScrolling() {
            console.log('Initializing mobile touch scrolling...');
            
            // Find all product grids with horizontal scroll
            const productGrids = document.querySelectorAll('.products-grid.d-flex.flex-row.overflow-auto');
            
            productGrids.forEach((grid, index) => {
                console.log(`Setting up touch scrolling for grid ${index}`);
                
                let isDown = false;
                let startX;
                let scrollLeft;
                let isScrolling = false;
                
                // Mouse events for desktop testing
                grid.addEventListener('mousedown', (e) => {
                    if (window.innerWidth <= 768) {
                        isDown = true;
                        grid.style.cursor = 'grabbing';
                        startX = e.pageX - grid.offsetLeft;
                        scrollLeft = grid.scrollLeft;
                        e.preventDefault();
                    }
                });
                
                grid.addEventListener('mouseleave', () => {
                    isDown = false;
                    grid.style.cursor = 'grab';
                });
                
                grid.addEventListener('mouseup', () => {
                    isDown = false;
                    grid.style.cursor = 'grab';
                });
                
                grid.addEventListener('mousemove', (e) => {
                    if (!isDown || window.innerWidth > 768) return;
                    e.preventDefault();
                    const x = e.pageX - grid.offsetLeft;
                    const walk = (x - startX) * 2;
                    grid.scrollLeft = scrollLeft - walk;
                });
                
                // Touch events for mobile
                grid.addEventListener('touchstart', (e) => {
                    if (window.innerWidth <= 768) {
                        isDown = true;
                        startX = e.touches[0].pageX - grid.offsetLeft;
                        scrollLeft = grid.scrollLeft;
                        isScrolling = false;
                        console.log('Touch start detected');
                    }
                });
                
                grid.addEventListener('touchmove', (e) => {
                    if (!isDown || window.innerWidth > 768) return;
                    
                    const x = e.touches[0].pageX - grid.offsetLeft;
                    const walk = (x - startX) * 2;
                    const newScrollLeft = scrollLeft - walk;
                    
                    // Check if actually scrolling horizontally
                    if (Math.abs(walk) > 10) {
                        isScrolling = true;
                        e.preventDefault();
                        grid.scrollLeft = newScrollLeft;
                        console.log('Touch scrolling, scrollLeft:', newScrollLeft);
                    }
                });
                
                grid.addEventListener('touchend', () => {
                    isDown = false;
                    console.log('Touch end, final scrollLeft:', grid.scrollLeft);
                });
                
                // Prevent vertical scroll when horizontal scrolling
                grid.addEventListener('touchmove', (e) => {
                    if (isScrolling && window.innerWidth <= 768) {
                        e.preventDefault();
                    }
                }, { passive: false });
                
                // Set cursor style
                if (window.innerWidth <= 768) {
                    grid.style.cursor = 'grab';
                }
                
                console.log(`Touch scrolling initialized for grid ${index}`);
            });
            
            // Re-initialize on window resize
            window.addEventListener('resize', () => {
                setTimeout(() => {
                    initializeMobileTouchScrolling();
                }, 100);
            });
        }
        
        function initializeAllDropdowns() {
            console.log('Initializing all Bootstrap dropdowns...');
            
            // Initialize all dropdown toggles on the page
            const dropdownToggles = document.querySelectorAll('[data-bs-toggle="dropdown"]');
            console.log('Found dropdown toggles:', dropdownToggles.length);
            
            dropdownToggles.forEach((toggle, index) => {
                if (window.bootstrap && window.bootstrap.Dropdown) {
                    try {
                        new window.bootstrap.Dropdown(toggle);
                        console.log(`Dropdown ${index} initialized successfully`);
                    } catch (error) {
                        console.error(`Error initializing dropdown ${index}:`, error);
                    }
                } else {
                    console.warn('Bootstrap not available for dropdown initialization');
                }
            });
        }
        
        function initializeMobileDropdown() {
            console.log('Initializing mobile dropdown...');
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const authLinkMobile = document.getElementById('authLinkMobile');
            const authLinkMobileLoggedIn = document.getElementById('authLinkMobileLoggedIn');
            const userNameMobile = document.getElementById('userNameMobile');
            const userDropdownMobile = document.getElementById('userDropdownMobile');
            const mobileMyOrders = document.getElementById('mobileMyOrders');
            const mobileLogout = document.getElementById('mobileLogout');
            
            console.log('Mobile elements found:', {
                authLinkMobile: !!authLinkMobile,
                authLinkMobileLoggedIn: !!authLinkMobileLoggedIn,
                userNameMobile: !!userNameMobile,
                userDropdownMobile: !!userDropdownMobile,
                mobileMyOrders: !!mobileMyOrders,
                mobileLogout: !!mobileLogout,
                currentUser: !!currentUser
            });
            
            if (authLinkMobile && authLinkMobileLoggedIn) {
                if (currentUser) {
                    // User is logged in - show logged in link with user name, hide login link
                    authLinkMobile.style.display = 'none';
                    authLinkMobileLoggedIn.style.display = 'block';
                    authLinkMobileLoggedIn.classList.remove('d-none');
                    
                    if (userNameMobile) {
                        userNameMobile.textContent = currentUser.name || currentUser.username || 'User';
                    }
                    
                    userDropdownMobile.style.display = 'none';
                    
                    if (mobileMyOrders) mobileMyOrders.style.display = 'block';
                    if (mobileLogout) mobileLogout.style.display = 'block';
                    
                    console.log('Mobile logged in link with user name shown');
                } else {
                    // User is not logged in - show login link, hide logged in link and sidebar menu items
                    authLinkMobile.style.display = 'block';
                    authLinkMobileLoggedIn.style.display = 'none';
                    authLinkMobileLoggedIn.classList.add('d-none');
                    
                    userDropdownMobile.style.display = 'none';
                    
                    if (mobileMyOrders) mobileMyOrders.style.display = 'none';
                    if (mobileLogout) mobileLogout.style.display = 'none';
                    
                    console.log('Mobile login link shown for logged out user');
                }
            }
        }
        
        function checkAuthStatus() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            // Desktop elements
            const authLinkDesktop = document.getElementById('authLinkDesktop');
            const userDropdownDesktop = document.getElementById('userDropdownDesktop');
            const userName = document.getElementById('userName');
            
            // Mobile elements
            const authLinkMobile = document.getElementById('authLinkMobile');
            const authLinkMobileLoggedIn = document.getElementById('authLinkMobileLoggedIn');
            const userNameMobile = document.getElementById('userNameMobile');
            const userDropdownMobile = document.getElementById('userDropdownMobile');
            const mobileMyOrders = document.getElementById('mobileMyOrders');
            const mobileLogout = document.getElementById('mobileLogout');
            
            if (currentUser) {
                // Update desktop elements
                if (authLinkDesktop && userDropdownDesktop) {
                    authLinkDesktop.style.display = 'none';
                    userDropdownDesktop.style.display = 'block';
                    if (userName) {
                        userName.textContent = currentUser.name || currentUser.username || 'User';
                    }
                }
                
                // Update mobile elements
                if (authLinkMobile) authLinkMobile.style.display = 'none';
                if (authLinkMobileLoggedIn) {
                    authLinkMobileLoggedIn.style.display = 'block';
                    authLinkMobileLoggedIn.classList.remove('d-none');
                    if (userNameMobile) {
                        userNameMobile.textContent = currentUser.name || currentUser.username || 'User';
                    }
                }
                if (userDropdownMobile) userDropdownMobile.style.display = 'none';
                if (mobileMyOrders) mobileMyOrders.style.display = 'block';
                if (mobileLogout) mobileLogout.style.display = 'block';
            } else {
                // Update desktop elements
                if (authLinkDesktop) authLinkDesktop.style.display = 'block';
                if (userDropdownDesktop) userDropdownDesktop.style.display = 'none';
                
                // Update mobile elements
                if (authLinkMobile) authLinkMobile.style.display = 'block';
                if (authLinkMobileLoggedIn) {
                    authLinkMobileLoggedIn.style.display = 'none';
                    authLinkMobileLoggedIn.classList.add('d-none');
                }
                if (userDropdownMobile) userDropdownMobile.style.display = 'none';
                if (mobileMyOrders) mobileMyOrders.style.display = 'none';
                if (mobileLogout) mobileLogout.style.display = 'none';
            }
        }
        
        function clearUserData() {
            // Clear all localStorage data to prevent data mixing between users
            localStorage.removeItem('currentUser');
            localStorage.removeItem('cartData');
            localStorage.clear();
            console.log('User data cleared from localStorage');
        }
        
        function logout(e) {
            if (e) e.preventDefault();
            console.log('Logout clicked');
            
            // Clear all localStorage data to prevent data mixing between users
            clearUserData();
            
            // Desktop elements
            const authLinkDesktop = document.getElementById('authLinkDesktop');
            const userDropdownDesktop = document.getElementById('userDropdownDesktop');
            
            // Mobile elements
            const authLinkMobile = document.getElementById('authLinkMobile');
            const authLinkMobileLoggedIn = document.getElementById('authLinkMobileLoggedIn');
            const userDropdownMobile = document.getElementById('userDropdownMobile');
            const mobileMyOrders = document.getElementById('mobileMyOrders');
            const mobileLogout = document.getElementById('mobileLogout');
            
            // Update desktop elements
            if (authLinkDesktop) authLinkDesktop.style.display = 'block';
            if (userDropdownDesktop) userDropdownDesktop.style.display = 'none';
            
            // Update mobile elements
            if (authLinkMobile) authLinkMobile.style.display = 'block';
            if (authLinkMobileLoggedIn) {
                authLinkMobileLoggedIn.style.display = 'none';
                authLinkMobileLoggedIn.classList.add('d-none');
            }
            if (userDropdownMobile) userDropdownMobile.style.display = 'none';
            if (mobileMyOrders) mobileMyOrders.style.display = 'none';
            if (mobileLogout) mobileLogout.style.display = 'none';
            
            // Reset cart count
            const cartCountMobile = document.getElementById('cart-count');
            const cartCountDesktop = document.getElementById('cart-count-desktop');
            if (cartCountMobile) {
                cartCountMobile.textContent = '0';
                cartCountMobile.style.display = 'none';
            }
            if (cartCountDesktop) {
                cartCountDesktop.textContent = '0';
                cartCountDesktop.style.display = 'none';
            }
            
            window.location.href = '/';
        }
        
        function goToMyOrders(e) {
            if (e) e.preventDefault();
            console.log('My Orders clicked');
            
            // Check if user is logged in
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('Please login first');
                window.location.href = '/login/';
                return;
            }
            
            window.location.href = '/orders/';
        }
        
        function goToCart(e) {
            if (e) e.preventDefault();
            console.log('Cart clicked');
            
            // Check if user is logged in
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('Please login first');
                window.location.href = '/login/';
                return;
            }
            
            try {
                window.location.href = '/cart/';
            } catch (error) {
                console.error('Navigation error:', error);
            }
        }
        
        // Cart Functions
        function addToCart(productId, productName, productPrice, productImage = null) {
            console.log('Adding to cart:', { productId, productName, productPrice, productImage });

            // Check if user is logged in
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                showNotification('Please login to add items to cart', 'error');
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 1500);
                return;
            }

            // Check if product is available (stock check)
            const button = document.querySelector(`[data-product-id="${productId}"]`);
            if (button && button.disabled) {
                showNotification('This product is currently out of stock', 'error');
                return;
            }

            // Store cart data in localStorage
            let cartData = JSON.parse(localStorage.getItem('cartData') || '[]');

            // Check if item already exists in cart
            const existingItemIndex = cartData.findIndex(item => item.id === productId);

            if (existingItemIndex !== -1) {
                // Update existing item quantity
                cartData[existingItemIndex].quantity += 1;
                cartData[existingItemIndex].subtotal += productPrice;
            } else {
                // Add new item to cart
                cartData.push({
                    id: productId,
                    name: productName,
                    price: productPrice,
                    quantity: 1,
                    subtotal: productPrice,
                    image: productImage
                });
            }

            // Store updated cart data
            localStorage.setItem('cartData', JSON.stringify(cartData));

            // Show success notification
            showNotification(`${productName} added to cart!`, 'success');

            // Update cart count
            updateCartCount();

            // Add animation to cart icon
            const cartIcon = document.querySelector('.fa-shopping-cart');
            if (cartIcon) {
                cartIcon.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    cartIcon.style.transform = 'scale(1)';
                }, 300);
            }
        }

        function updateCartCount() {
            const cartData = JSON.parse(localStorage.getItem('cartData') || '[]');
            const totalItems = cartData.reduce((sum, item) => sum + item.quantity, 0);
            
            // Update mobile cart count
            const cartCountMobile = document.getElementById('cart-count');
            if (cartCountMobile) {
                cartCountMobile.textContent = totalItems;
                cartCountMobile.style.display = totalItems > 0 ? 'flex' : 'none';
            }
            
            // Update desktop cart count
            const cartCountDesktop = document.getElementById('cart-count-desktop');
            if (cartCountDesktop) {
                cartCountDesktop.textContent = totalItems;
                cartCountDesktop.style.display = totalItems > 0 ? 'flex' : 'none';
            }
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            notification.style.cssText = `
                top: 20px;
                right: 20px;
                z-index: 9999;
                min-width: 300px;
                max-width: 400px;
                padding: 15px;
                border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                animation: slideInRight 0.3s ease;
            `;
            notification.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div class="fw-bold">${message}</div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // Initialize cart functionality
        document.addEventListener('DOMContentLoaded', function() {
            console.log('=== INITIALIZING CART FUNCTIONALITY ===');
            
            // Check auth status
            checkAuthStatus();
            
            // Fetch user's cart data from backend
            updateCartCount();
            
            // Ensure mobile dropdown is properly initialized
            initializeMobileDropdown();
            
            // Fallback initialization after delay
            setTimeout(() => {
                console.log('Running fallback mobile dropdown initialization...');
                initializeMobileDropdown();
            }, 500);
            
            // Additional fallback after Bootstrap is loaded
            setTimeout(() => {
                console.log('Running Bootstrap-dependent mobile dropdown initialization...');
                initializeMobileDropdown();
                initializeAllDropdowns();
            }, 1000);
            
            // Initialize mobile touch scrolling
            initializeMobileTouchScrolling();
            
            // Update cart count
            updateCartCount();
            
            // Function to attach button listeners
            function attachButtonListeners() {
                const addToCartButtons = document.querySelectorAll('.add-to-cart-btn');
                console.log('Found Add to Cart buttons:', addToCartButtons.length);
                
                addToCartButtons.forEach((button, index) => {
                    console.log(`Button ${index}:`, {
                        class: button.className,
                        productId: button.getAttribute('data-product-id'),
                        productName: button.getAttribute('data-product-name'),
                        productPrice: button.getAttribute('data-product-price'),
                        productImage: button.getAttribute('data-product-image')
                    });
                    
                    // Remove existing listeners to avoid duplicates
                    button.removeEventListener('click', handleAddToCart);
                    
                    // Add new listener
                    button.addEventListener('click', handleAddToCart);
                    
                    console.log(`Event listener attached to button ${index}`);
                });
                
                return addToCartButtons.length;
            }
            
            // Handle add to cart click
            function handleAddToCart(e) {
                console.log('=== BUTTON CLICKED ===');
                console.log('Button clicked:', this);
                e.preventDefault();
                e.stopPropagation();
                
                const productId = this.getAttribute('data-product-id');
                const productName = this.getAttribute('data-product-name');
                const productPrice = parseFloat(this.getAttribute('data-product-price'));
                const productImage = this.getAttribute('data-product-image');
                
                console.log('Extracted data:', { productId, productName, productPrice, productImage });
                
                if (!productId || !productName || !productPrice) {
                    console.error('Missing product data');
                    showNotification('Invalid product data', 'error');
                    return;
                }
                
                addToCart(productId, productName, productPrice, productImage);
            }
            
            // Initial attachment
            let buttonCount = attachButtonListeners();
            
            // Fallback: try again after delay (for dynamic content)
            setTimeout(() => {
                console.log('Retrying button attachment...');
                const newButtonCount = attachButtonListeners();
                if (newButtonCount > buttonCount) {
                    console.log(`Found ${newButtonCount - buttonCount} additional buttons`);
                }
            }, 500);
            
            // Fallback: try again after longer delay
            setTimeout(() => {
                console.log('Final retry for button attachment...');
                attachButtonListeners();
            }, 2000);
            
            // Test direct button click
            setTimeout(() => {
                const testButton = document.querySelector('.add-to-cart-btn');
                if (testButton) {
                    console.log('Test button found:', testButton);
                    console.log('Test button attributes:', {
                        id: testButton.getAttribute('data-product-id'),
                        name: testButton.getAttribute('data-product-name'),
                        price: testButton.getAttribute('data-product-price')
                    });
                } else {
                    console.error('No Add to Cart button found on page');
                }
            }, 1000);
            
            // Make addToCart globally available for manual testing
            window.addToCart = addToCart;
            window.testAddToCart = function() {
                const testButton = document.querySelector('.add-to-cart-btn');
                if (testButton) {
                    console.log('Manually triggering button click');
                    testButton.click();
                } else {
                    console.error('No button found to test');
                }
            };
        });
    </script>
