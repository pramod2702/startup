{% extends 'fragrances/base.html' %}
{% load static %}
{% block title %}Customer Details - VICTNOW{% endblock %}

{% block content %}
<!-- Modern Customer Details Section -->
<section class="customer-details-section">
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <div class="logo-section">
                    <div class="victnow-logo">VICTNOW</div>
                    <div class="tagline">Premium Fragrance Collection</div>
                </div>
                <h2>Complete Your Order</h2>
                <p>Fill in your details for a seamless checkout experience</p>
            </div>
            
            <form id="customerDetailsForm" method="POST" action="/process-order/">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">
                            <i class="fas fa-user"></i>
                            Full Name
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="fullName" name="fullName" required placeholder="John Doe" value="">
                        <div class="input-underline"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                            <span class="required">*</span>
                        </label>
                        <input type="email" id="email" name="email" required placeholder="john.doe@example.com" value="">
                        <div class="input-underline"></div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">
                            <i class="fas fa-phone"></i>
                            Phone Number
                            <span class="required">*</span>
                        </label>
                        <input type="tel" id="phone" name="phone" required placeholder="+91 98765 43210" value="">
                        <div class="input-underline"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="whatsapp">
                            <i class="fab fa-whatsapp"></i>
                            WhatsApp Number
                        </label>
                        <input type="tel" id="whatsapp" name="whatsapp" placeholder="+91 98765 43210" value="">
                        <div class="input-underline"></div>
                    </div>
                </div>
                
                <div class="form-group full-width">
                    <label for="address">
                        <i class="fas fa-home"></i>
                        Delivery Address
                        <span class="required">*</span>
                    </label>
                    <textarea id="address" name="address" required placeholder="Enter your complete delivery address" rows="3"></textarea>
                    <div class="input-underline"></div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="city">
                            <i class="fas fa-map-marker-alt"></i>
                            City
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="city" name="city" required placeholder="Mumbai" value="">
                        <div class="input-underline"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="state">
                            <i class="fas fa-flag"></i>
                            State
                            <span class="required">*</span>
                        </label>
                        <select id="state" name="state" required>
                            <option value="">Select State</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                            <option value="Assam">Assam</option>
                            <option value="Bihar">Bihar</option>
                            <option value="Chhattisgarh">Chhattisgarh</option>
                            <option value="Goa">Goa</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Haryana">Haryana</option>
                            <option value="Himachal Pradesh">Himachal Pradesh</option>
                            <option value="Jharkhand">Jharkhand</option>
                            <option value="Karnataka">Karnataka</option>
                            <option value="Kerala">Kerala</option>
                            <option value="Madhya Pradesh">Madhya Pradesh</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Manipur">Manipur</option>
                            <option value="Meghalaya">Meghalaya</option>
                            <option value="Mizoram">Mizoram</option>
                            <option value="Nagaland">Nagaland</option>
                            <option value="Odisha">Odisha</option>
                            <option value="Punjab">Punjab</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Sikkim">Sikkim</option>
                            <option value="Tamil Nadu">Tamil Nadu</option>
                            <option value="Telangana">Telangana</option>
                            <option value="Tripura">Tripura</option>
                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                            <option value="Uttarakhand">Uttarakhand</option>
                            <option value="West Bengal">West Bengal</option>
                        </select>
                        <div class="input-underline"></div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="pincode">
                            <i class="fas fa-mail-bulk"></i>
                            PIN Code
                            <span class="required">*</span>
                        </label>
                        <input type="text" id="pincode" name="pincode" required placeholder="400001" maxlength="6" pattern="[0-9]{6}">
                        <div class="input-underline"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="landmark">
                            <i class="fas fa-map-pin"></i>
                            Landmark (Optional)
                        </label>
                        <input type="text" id="landmark" name="landmark" placeholder="Near Railway Station">
                        <div class="input-underline"></div>
                    </div>
                </div>
                
                <div class="form-group full-width">
                    <label for="orderNotes">
                        <i class="fas fa-sticky-note"></i>
                        Order Notes (Optional)
                    </label>
                    <textarea id="orderNotes" name="orderNotes" placeholder="Any special delivery instructions or notes" rows="3"></textarea>
                    <div class="input-underline"></div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                        <i class="fas fa-arrow-left"></i>
                        Back to Cart
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i>
                        Proceed to Payment
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
    color: #ffffff;
    line-height: 1.6;
    min-height: 100vh;
    position: relative;
}

.customer-details-section {
    padding: 80px 20px;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.form-container {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.08));
    backdrop-filter: blur(30px);
    border-radius: 25px;
    padding: 50px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
}

.form-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(0, 0, 0, 0.3)"/><circle cx="75" cy="75" r="1" fill="rgba(0, 0, 0, 0.2)"/><circle cx="50" cy="10" r="0.5" fill="rgba(0, 0, 0, 0.1)"/><circle cx="20" cy="60" r="0.5" fill="rgba(0, 0, 0, 0.1)"/><circle cx="80" cy="40" r="0.5" fill="rgba(0, 0, 0, 0.1)"/><rect x="10" y="10" width="80" height="80" fill="none" stroke="rgba(0, 0, 0, 0.5)" stroke-width="0.5" rx="10" ry="10"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
    opacity: 0.3;
    z-index: 0;
    animation: subtleMove 20s ease-in-out infinite;
}

.form-header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
}

.logo-section {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
    position: relative;
}

.victnow-logo {
    font-size: 2.5rem;
    font-weight: 900;
    color: #d4af37;
    text-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    position: relative;
}

.victnow-logo::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #d4af37, #b8941f);
    border-radius: 2px;
}

.tagline {
    font-size: 1rem;
    color: rgba(212, 175, 55, 0.8);
    margin-left: 20px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.form-header h2 {
    color: #ffffff;
    font-size: 2.2rem;
    font-weight: 700;
    margin: 0 0 15px 0;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 3px 12px rgba(212, 175, 55, 0.3);
}

.form-header p {
    color: rgba(212, 175, 55, 0.8);
    font-size: 1.1rem;
    margin: 0;
    font-weight: 400;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 25px;
    position: relative;
}

.form-group label {
    display: flex;
    align-items: center;
    color: #000000;
    font-weight: 600;
    margin-bottom: 12px;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    gap: 10px;
}

.required {
    color: #d4af37;
    font-weight: 700;
    margin-left: 5px;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 18px;
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 1rem;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 0 20px rgba(212, 175, 55, 0.3);
    background: rgba(255, 255, 255, 0.15);
}

.input-underline {
    position: absolute;
    bottom: 0;
    left: 18px;
    right: 18px;
    height: 2px;
    background: linear-gradient(90deg, rgba(212, 175, 55, 0.3), rgba(212, 175, 55, 0.3));
}

.full-width {
    grid-column: 1 / -1;
}

.form-actions {
    display: flex;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn {
    padding: 18px 35px;
    border: none;
    border-radius: 15px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-sizing: border-box;
    display: inline-block;
    text-decoration: none;
    position: relative;
    z-index: 9999;
    pointer-events: auto;
}

.btn-primary {
    background: linear-gradient(135deg, #d4af37, #b8941f);
    color: #0a0a0a;
    box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
}

.btn-primary:hover {
    background: linear-gradient(135deg, #e5c453, #c7a520);
    transform: translateY(-2px);
    box-shadow: 0 20px 45px rgba(212, 175, 55, 0.5);
}

.btn-secondary {
    background: transparent;
    color: rgba(212, 175, 55, 0.8);
    border: 2px solid rgba(212, 175, 55, 0.3);
}

.btn-secondary:hover {
    background: rgba(212, 175, 55, 0.1);
    color: #d4af37;
    transform: translateY(-2px);
}

@media (max-width: 768px) {
    .customer-details-section {
        padding: 60px 15px;
        max-width: 100%;
    }
    
    .form-container {
        padding: 40px;
    }
    
    .form-row {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    
    .form-actions {
        flex-direction: column;
    gap: 15px;
    }
}

.field-error {
    color: #ef4444;
    font-size: 0.875rem;
    margin-top: 5px;
    display: block;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Customer details page loaded');
    
    const form = document.getElementById('customerDetailsForm');
    console.log('Form found:', form);
    
    if (form) {
        form.addEventListener('submit', function(e) {
            console.log('Form submit event triggered');
            e.preventDefault();
            e.stopPropagation();
            
            // Clear previous errors
            clearFormErrors();
            
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const pincode = document.getElementById('pincode').value.trim();
            
            console.log('Form values:', { fullName, email, phone, address, city, state, pincode });
            
            // Validate required fields
            let hasError = false;
            let firstErrorField = null;
            
            if (!fullName) {
                showFieldError('fullName', 'Please enter your full name');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('fullName');
            }
            
            if (!email) {
                showFieldError('email', 'Please enter your email address');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('email');
            } else {
                // Validate email format
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showFieldError('email', 'Please enter a valid email address');
                    hasError = true;
                    if (!firstErrorField) firstErrorField = document.getElementById('email');
                }
            }
            
            if (!phone) {
                showFieldError('phone', 'Please enter your phone number');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('phone');
            } else {
                // Validate phone (10 digits)
                const phoneRegex = /^[6-9]\d{9}$/;
                if (!phoneRegex.test(phone.replace(/\D/g, ''))) {
                    showFieldError('phone', 'Please enter a valid 10-digit phone number');
                    hasError = true;
                    if (!firstErrorField) firstErrorField = document.getElementById('phone');
                }
            }
            
            if (!address) {
                showFieldError('address', 'Please enter your delivery address');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('address');
            }
            
            if (!city) {
                showFieldError('city', 'Please enter your city');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('city');
            }
            
            if (!state) {
                showFieldError('state', 'Please select your state');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('state');
            }
            
            if (!pincode) {
                showFieldError('pincode', 'Please enter your PIN code');
                hasError = true;
                if (!firstErrorField) firstErrorField = document.getElementById('pincode');
            } else {
                // Validate PIN code (6 digits)
                if (!/^\d{6}$/.test(pincode)) {
                    showFieldError('pincode', 'Please enter a valid 6-digit PIN code');
                    hasError = true;
                    if (!firstErrorField) firstErrorField = document.getElementById('pincode');
                }
            }
            
            console.log('Has error:', hasError);
            
            // If there are errors, focus on the first error field
            if (hasError) {
                console.log('Validation failed, focusing on first error field');
                if (firstErrorField) {
                    firstErrorField.focus();
                }
                return;
            }
            
            // All validations passed
            console.log('Validation passed, proceeding to payment');
            
            // Store customer data
            const customerData = {
                fullName: fullName,
                email: email,
                phone: phone,
                whatsapp: document.getElementById('whatsapp').value.trim(),
                address: address,
                city: city,
                state: state,
                pincode: pincode,
                landmark: document.getElementById('landmark').value.trim(),
                orderNotes: document.getElementById('orderNotes').value.trim(),
                timestamp: new Date().toISOString()
            };
            
            // Store in localStorage
            localStorage.setItem('customerData', JSON.stringify(customerData));
            sessionStorage.setItem('customerData', JSON.stringify(customerData));
            
            // Proceed to payment
            proceedToPayment(customerData);
        });
    } else {
        console.error('Form not found!');
    }
    
    function showFieldError(fieldId, message) {
        const field = document.getElementById(fieldId);
        if (!field) {
            console.error('Field not found:', fieldId);
            return;
        }
        
        // Remove existing error
        const existingError = field.parentNode.querySelector('.field-error');
        if (existingError) {
            existingError.remove();
        }
        
        // Create error element
        const errorDiv = document.createElement('div');
        errorDiv.className = 'field-error';
        errorDiv.textContent = message;
        
        // Insert error after field
        field.parentNode.insertBefore(errorDiv, field.nextSibling);
        
        // Add red border to field
        field.style.borderColor = '#ef4444';
        field.style.boxShadow = '0 0 0 2px rgba(239, 68, 68, 0.2)';
        
        console.log('Error shown for field:', fieldId, message);
    }
    
    function clearFormErrors() {
        // Remove all error messages
        const errorMessages = document.querySelectorAll('.field-error');
        errorMessages.forEach(msg => msg.remove());
        
        // Reset field styles
        const formFields = document.querySelectorAll('input, textarea, select');
        formFields.forEach(field => {
            field.style.borderColor = '';
            field.style.boxShadow = '';
        });
    }
    
    function proceedToPayment(customerData) {
        console.log('Proceeding to payment with data:', customerData);
        
        // Check if Razorpay is loaded
        if (typeof Razorpay === 'undefined') {
            console.error('Razorpay is not loaded!');
            alert('Payment gateway is loading. Please wait a moment and try again.');
            return;
        }
        
        console.log('Razorpay is loaded:', Razorpay);
        
        // Show processing message
        showProcessingMessage();
        
        // Get cart total from localStorage
        const cartData = JSON.parse(localStorage.getItem('cartData') || '[]');
        const totalAmount = cartData.reduce((sum, item) => sum + (item.subtotal || (item.price * item.quantity)), 0);
        
        console.log('Cart data:', cartData);
        console.log('Cart total:', totalAmount);
        
        // If cart is empty, show error
        if (cartData.length === 0) {
            hideProcessingMessage();
            alert('Your cart is empty. Please add items to cart before proceeding.');
            return;
        }
        
        // Open Razorpay
        const options = {
            key: 'rzp_live_SWbTlXM1BhD6RZ',
            amount: Math.round(totalAmount * 100), // Convert to paise
            currency: 'INR',
            name: 'VICTNOW Order',
            description: `Order for ${cartData.length} items`,
            image: '/static/images/perfume.png',
            handler: function (response) {
                console.log('Payment successful:', response);
                
                // Save order to backend
                fetch('/process-order/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        customer_data: customerData,
                        cart_data: cartData,
                        total_amount: totalAmount,
                        payment_id: response.razorpay_payment_id,
                        payment_method: 'razorpay',
                        payment_status: 'completed'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Order saved:', data);
                    // Clear cart
                    localStorage.removeItem('cartData');
                    // Redirect to success page
                    window.location.href = '/payment-success/?payment_id=' + response.razorpay_payment_id;
                })
                .catch(error => {
                    console.error('Error saving order:', error);
                    alert('Payment successful! We will contact you soon.');
                    window.location.href = '/payment-success/?payment_id=' + response.razorpay_payment_id;
                });
            },
            prefill: {
                name: customerData.fullName,
                email: customerData.email,
                contact: customerData.phone
            },
            notes: {
                address: customerData.address,
                city: customerData.city,
                state: customerData.state,
                pincode: customerData.pincode,
                order_type: 'Regular Order'
            },
            theme: {
                color: '#d4af37'
            },
            modal: {
                ondismiss: function() {
                    console.log('Razorpay modal closed');
                    hideProcessingMessage();
                },
                escape: true,
                handleback: true
            }
        };
        
        console.log('Razorpay options:', options);
        
        try {
            const rzp = new Razorpay(options);
            console.log('Razorpay instance created:', rzp);
            rzp.open();
        } catch (error) {
            console.error('Error opening Razorpay:', error);
            hideProcessingMessage();
            alert('Unable to open payment gateway. Please try again.');
        }
    }
    
    function showProcessingMessage() {
        const processingDiv = document.createElement('div');
        processingDiv.id = 'processing-message';
        processingDiv.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; z-index: 99999;';
        processingDiv.innerHTML = '<div style="text-align: center; color: #d4af37;"><div style="width: 60px; height: 60px; border: 3px solid #d4af37; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div><h2>Processing Payment...</h2><p>Opening Razorpay payment gateway...</p></div><style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>';
        document.body.appendChild(processingDiv);
    }
    
    function hideProcessingMessage() {
        const processingDiv = document.getElementById('processing-message');
        if (processingDiv) {
            processingDiv.remove();
        }
    }
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
{% endblock %}
</body>
</html>
